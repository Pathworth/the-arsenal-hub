<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Command Deck — Jermaine Peguese</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="glow"></div>
  <header class="top">
    <div class="brand">
      <div class="mark">JP</div>
      <div>
        <h1>Command Deck</h1>
        <p class="tagline">Everything I've built. One door.</p>
      </div>
    </div>
    <div class="modewrap">
      <span id="mode" class="mode mode-web" title="">Web Mode</span>
    </div>
  </header>

  <div class="controls">
    <input id="search" type="search" placeholder="Search tools, sites, dashboards…" autocomplete="off" />
    <div id="filters" class="filters"></div>
  </div>

  <main id="app"></main>

  <footer class="foot">
    <span>Jermaine Peguese Signature</span>
    <span id="counts"></span>
  </footer>

  <script src="deck.js"></script>
</body>
</html>
