<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>The Arsenal — Jermaine Peguese</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="glow"></div>
  <header class="top">
    <div class="brand">
      <div class="mark">JP</div>
      <div>
        <p class="kicker">Command Deck</p>
        <h1>The Arsenal</h1>
        <p class="tagline">Everything I've built. One door.</p>
      </div>
    </div>
    <div class="modewrap">
      <span id="mode" class="mode mode-web" title="">Web Mode</span>
    </div>
  </header>

  <div class="controls">
    <input id="search" type="search" placeholder="Search tools, sites, dashboards…" autocomplete="off" />
    <div id="filters" class="filters"></div>
  </div>

  <main id="app"></main>

  <footer class="foot">
    <span>Jermaine Peguese Signature</span>
    <span id="counts"></span>
  </footer>

  <div id="modal" class="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modal-title"></h3>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <p class="modal-sub" id="modal-sub"></p>
      <div id="modal-mock"></div>
      <div class="modal-foot">
        <span class="modal-note">Preview of the interface. This tool runs on your PC.</span>
      </div>
    </div>
  </div>

  <script src="mockups.js"></script>
  <script src="deck.js"></script>
</body>
</html>
